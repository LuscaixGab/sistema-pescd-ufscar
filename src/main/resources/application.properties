spring.application.name=pescd
spring.datasource.url=jdbc:mysql://localhost:3307/pescd_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=pescd_user
spring.datasource.password=pescd_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# Limite tecnico levemente acima de 5MB para permitir que a aplicacao mostre erro amigavel.
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
