<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acompanhamento da Oferta | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-shell { max-width: 1200px !important; width: 95% !important; margin: 0 auto !important; }
        .page-card { width: 100% !important; max-width: none !important; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--field-border); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .stat-label { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; background: rgba(255,255,255,0.1); color: white; display: inline-block; }
        .status-NAO_ENVIADO { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .status-CONCLUIDO { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .status-PLANO_APROVADO { background: rgba(56, 189, 248, 0.2); color: #7dd3fc; }
    </style>
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker">Painel de Acompanhamento</p>
                <h1 th:text="${oferta.nomeOferta}">Nome da Disciplina</h1>
                <p th:text="${'Semestre: ' + oferta.semestre + ' | Prof. Responsável: ' + oferta.professorResponsavel.nomeCompleto}"></p>
            </div>
            <a class="button-link secondary" th:href="@{/ofertas}">Voltar para Lista</a>
        </header>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-label">Total de Alunos</div>
                <div class="stat-number" th:text="${totalAlunos}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ainda não enviaram nada</div>
                <div class="stat-number" style="color: #f87171;" th:text="${pendentesIniciais}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Em andamento</div>
                <div class="stat-number" style="color: #fbbf24;" th:text="${emAndamento}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Concluídos</div>
                <div class="stat-number" style="color: #34d399;" th:text="${concluidos}">0</div>
            </div>
        </div>

        <h3>Relatório de Alunos</h3>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Nome do Aluno</th>
                    <th>E-mail</th>
                    <th>Status Atual no PESCD</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inscricao : ${inscricoes}">
                    <td th:text="${inscricao.aluno.nomeCompleto}">Nome do Aluno</td>
                    <td th:text="${inscricao.aluno.email}">email@pescd.local</td>
                    <td>
                            <span th:class="${'status-badge status-' + inscricao.status.name()}"
                                  th:text="${inscricao.status.name()}">STATUS</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(inscricoes)}">
                    <td colspan="3" style="text-align: center; padding: 20px;">Nenhum aluno matriculado nesta oferta ainda.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
