<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker">Workflow</p>
                <h1>Ofertas cadastradas</h1>
                <p>Gerencie as ofertas iniciadas pelo secretário.</p>
            </div>
            <div>
                <a class="button-link" th:href="@{/ofertas/nova}">Nova oferta</a>
                <a class="button-link" th:href="@{../painel}">Voltar</a>
            </div>
        </header>

        <div th:if="${mensagemSucesso}" class="notice success" th:text="${mensagemSucesso}"></div>

        <div th:if="${erroGeral}" class="notice error" th:text="${erroGeral}"></div>
        <div th:if="${param.erro}" class="notice error" th:text="${param.erro}"></div>

        <div class="table-wrap" th:if="${#lists.isEmpty(ofertas)}">
            <p class="empty-state">Nenhuma oferta cadastrada ainda.</p>
        </div>

        <div class="table-wrap" th:if="${!#lists.isEmpty(ofertas)}">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Semestre</th>
                    <th>Início</th>
                    <th>Fim</th>
                    <th>Professor</th>
                    <th>Status</th>
                    <th>Criada em</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="oferta : ${ofertas}">
                    <td th:text="${oferta.nomeOferta}"></td>
                    <td th:text="${oferta.semestre}"></td>
                    <td th:text="${#temporals.format(oferta.dataInicio, 'dd/MM/yyyy')}"></td>
                    <td th:text="${#temporals.format(oferta.dataFim, 'dd/MM/yyyy')}"></td>
                    <td th:text="${oferta.professorResponsavel.nomeCompleto}"></td>

                    <td>
                        <span th:text="${statusOfertas.get(oferta.id)}"
                              th:style="${statusOfertas.get(oferta.id) == 'Em andamento' ? 'color: #38bdf8; font-weight: bold;' :
                                         statusOfertas.get(oferta.id) == 'Em atraso' ? 'color: #ef4444; font-weight: bold;' :
                                         statusOfertas.get(oferta.id) == 'Concluída' ? 'color: #34d399; font-weight: bold;' :
                                         'color: #fbbf24; font-weight: bold;'}">
                        </span>
                    </td>

                    <td th:text="${#temporals.format(oferta.dataCriacao, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <a class="button-link secondary" style="padding: 6px 12px; font-size: 12px;" th:href="@{/ofertas/{id}/alunos(id=${oferta.id})}">Adicionar Alunos</a>
                            <a class="button-link" style="padding: 6px 12px; font-size: 12px; background: linear-gradient(135deg, #10b981, #059669); color: white;" th:href="@{/ofertas/{id}/acompanhamento(id=${oferta.id})}">Acompanhar</a>

                            <a th:if="${statusOfertas.get(oferta.id) == 'Aguardando encerramento do secretário'}"
                               class="button-link"
                               style="padding: 6px 12px; font-size: 12px; background: linear-gradient(135deg, #ef4444, #b91c1c); color: white;"
                               th:href="@{/ofertas/{id}/encerrar(id=${oferta.id})}">
                                Encerrar
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
