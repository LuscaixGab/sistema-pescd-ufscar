<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{offers.title}">Ofertas | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{offers.workflow}">Workflow</p>
                <h1 th:text="#{offers.heading}">Ofertas cadastradas</h1>
                <p th:text="#{offers.subtitle}">Gerencie as ofertas iniciadas pelo secretário.</p>
            </div>
            <div>
                <a th:if="${perfilUsuario == 'SECRETARIO'}" class="button-link" th:href="@{/ofertas/nova}" th:text="#{offers.new}">Nova oferta</a>
                <a th:if="${perfilUsuario == 'PROFESSOR'}" class="button-link secondary" th:href="@{/professor-responsavel/painel}" th:text="#{common.back.dashboard}">Voltar ao painel</a>
                <a th:if="${perfilUsuario != 'PROFESSOR'}" class="button-link secondary" th:href="@{/painel}" th:text="#{common.back.dashboard}">Voltar ao painel</a>
            </div>
        </header>

        <div th:if="${mensagemSucesso}" class="notice success" th:text="${mensagemSucesso}"></div>

        <div th:if="${erroGeral}" class="notice error" th:text="${erroGeral}"></div>
        <div th:if="${param.erro}" class="notice error" th:text="${param.erro}"></div>

        <div class="table-wrap" th:if="${#lists.isEmpty(ofertas)}">
            <p class="empty-state" th:text="#{offers.empty}">Nenhuma oferta cadastrada ainda.</p>
        </div>

        <div class="table-wrap" th:if="${!#lists.isEmpty(ofertas)}">
            <table class="data-table">
                <thead>
                <tr>
                    <th th:text="#{common.name}">Nome</th>
                    <th th:text="#{common.semester}">Semestre</th>
                    <th th:text="#{common.start}">Início</th>
                    <th th:text="#{common.end}">Fim</th>
                    <th th:text="#{common.professor}">Professor</th>
                    <th th:text="#{common.status}">Status</th>
                    <th th:text="#{common.createdAt}">Criada em</th>
                    <th th:text="#{common.actions}">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="oferta : ${ofertas}">
                    <td th:text="${oferta.nomeOferta}"></td>
                    <td th:text="${oferta.semestre}"></td>
                    <td th:text="${#temporals.format(oferta.dataInicio, 'dd/MM/yyyy')}"></td>
                    <td th:text="${#temporals.format(oferta.dataFim, 'dd/MM/yyyy')}"></td>
                    <td th:text="${oferta.professorResponsavel.nomeCompleto}"></td>

                    <td>
                        <span th:text="${statusOfertas.get(oferta.id)}"
                              th:style="${statusOfertas.get(oferta.id) == 'Em andamento' ? 'color: #38bdf8; font-weight: bold;' :
                                         statusOfertas.get(oferta.id) == 'Em atraso' ? 'color: #ef4444; font-weight: bold;' :
                                         statusOfertas.get(oferta.id) == 'Concluída' ? 'color: #34d399; font-weight: bold;' :
                                         'color: #fbbf24; font-weight: bold;'}">
                        </span>
                    </td>

                    <td th:text="${#temporals.format(oferta.dataCriacao, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <a th:if="${perfilUsuario == 'SECRETARIO'}" class="button-link secondary" style="padding: 6px 12px; font-size: 12px;" th:href="@{/ofertas/{id}/alunos(id=${oferta.id})}" th:text="#{offers.addStudents}">Adicionar Alunos</a>

                            <a class="button-link" style="padding: 6px 12px; font-size: 12px; background: linear-gradient(135deg, #10b981, #059669); color: white;" th:href="@{/ofertas/{id}/acompanhamento(id=${oferta.id})}" th:text="#{offers.follow}">Acompanhar</a>

                            <a th:if="${perfilUsuario == 'SECRETARIO' and statusOfertas.get(oferta.id) == 'Aguardando encerramento do secretário'}"
                               class="button-link"
                               style="padding: 6px 12px; font-size: 12px; background: linear-gradient(135deg, #ef4444, #b91c1c); color: white;"
                               th:href="@{/ofertas/{id}/encerrar(id=${oferta.id})}" th:text="#{offers.close.action}">
                                Encerrar
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
