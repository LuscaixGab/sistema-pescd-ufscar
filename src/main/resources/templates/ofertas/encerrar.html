<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{offers.close.title}">Confirmar Encerramento | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell" style="max-width: 750px; margin: 0 auto;">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{offers.close.security}">Confirmação de Segurança</p>
                <h1 th:text="#{offers.close.heading}">Encerrar Oferta do PESCD</h1>
            </div>
        </header>

        <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 6px; margin-bottom: 20px;">
            <p><strong th:text="#{student.report.discipline}">Disciplina:</strong> <span th:text="${oferta.nomeOferta}"></span></p>
            <p><strong th:text="#{offers.close.semester}">Semestre:</strong> <span th:text="${oferta.semestre}"></span></p>
        </div>

        <div style="background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); padding: 20px; border-radius: 8px; color: #fca5a5; white-space: pre-line;">
            <h3 style="margin-top: 0; color: #ef4444;" th:text="#{offers.close.warningTitle}">Atenção:</h3>
            <p th:text="${instrucoes}"></p>
        </div>

        <form th:action="@{/ofertas/{id}/encerrar(id=${oferta.id})}" method="post" style="margin-top: 25px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div style="display: flex; gap: 15px; justify-content: flex-end;">
                <a class="button-link secondary" th:href="@{/ofertas}" th:text="#{offers.close.back}">Cancelar e Voltar</a>
                <button type="submit" class="button-link" style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none;" th:text="#{offers.close.confirm}">Sim, Encerrar Oferta</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
