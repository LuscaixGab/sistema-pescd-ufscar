<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Avaliar Plano | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-shell { max-width: 800px !important; width: 95% !important; margin: 0 auto !important; }
        .page-card { width: 100% !important; max-width: none !important; }
        .info-box { background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .info-box p { margin: 5px 0; }
        textarea { width: 100%; min-height: 150px; padding: 10px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.2); background-color: rgba(0, 0, 0, 0.2); color: white; margin-bottom: 20px; }
        .action-buttons { display: flex; gap: 15px; justify-content: flex-end; }
        .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a) !important; color: white !important; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626) !important; color: white !important; }
    </style>
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker">Professor Supervisor</p>
                <h1>Avaliação de Plano de Trabalho</h1>
            </div>
            <a class="button-link secondary" th:href="@{/professor/planos/pendentes}">Voltar</a>
        </header>

        <div class="info-box">
            <p><strong>Aluno:</strong> <span th:text="${plano.inscricao.aluno.nomeCompleto}">Nome</span></p>
            <p><strong>Código da Disciplina:</strong> <span th:text="${plano.codigoDisciplina}">Código</span></p>
            <p><strong>Nome da Disciplina:</strong> <span th:text="${plano.nomeDisciplina}">Nome</span></p>
            <p><strong>Curso:</strong> <span th:text="${plano.cursoDisciplina}">Curso</span></p>

            <p style="margin-top: 15px;">
                <a th:href="@{/professor/planos/download/{id}(id=${plano.id})}" class="button-link btn-sm" target="_blank">Baixar Plano (PDF)</a>
            </p>
        </div>

        <form th:action="@{/professor/planos/{id}/avaliar(id=${plano.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label for="parecer"><strong>Parecer (Comentário Obrigatório):</strong></label>
                <textarea id="parecer" name="parecer" placeholder="Deixe suas considerações ou justificativa para aprovação/reprovação..." required></textarea>
            </div>

            <div class="action-buttons">
                <button type="submit" name="acao" value="aprovar" class="button-link btn-success">Aprovar Plano</button>
                <button type="submit" name="acao" value="reprovar" class="button-link btn-danger">Reprovar Plano</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
