<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Planos Pendentes | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-shell { max-width: 1400px !important; width: 95% !important; margin: 0 auto !important; }
        .page-card { width: 100% !important; max-width: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-sm { padding: 6px 12px !important; font-size: 12px !important; white-space: nowrap !important; }
    </style>
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker">Professor Supervisor</p>
                <h1>Planos de Trabalho Pendentes</h1>
                <p>Planos aguardando sua aprovação para o início do estágio.</p>
            </div>
            <a class="button-link secondary" th:href="@{/professor/atuacao}">Voltar</a>
        </header>

        <div th:if="${sucesso}" class="notice success" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="notice error" th:text="${erro}"></div>
        <div th:if="${param.erro}" class="notice error" th:text="${param.erro}"></div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Oferta</th>
                    <th>Disciplina</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="plano : ${planos}">
                    <td th:text="${plano.inscricao.aluno.nomeCompleto}">Nome do Aluno</td>
                    <td th:text="${plano.inscricao.oferta.nomeOferta}">Nome da Oferta</td>
                    <td th:text="${plano.nomeDisciplina}">Disciplina do Plano</td>
                    <td>
                        <a th:href="@{/professor/planos/{id}/avaliar(id=${plano.id})}" class="button-link btn-sm">Analisar Plano</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(planos)}">
                    <td colspan="4" style="text-align: center; padding: 20px;">Nenhum plano pendente de avaliação.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
