<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{responsible.panel.title}">Painel do Professor Responsável | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{professor.responsible}">Professor Responsável</p>
                <h1 th:text="#{responsible.panel.heading}">Painel do Responsável</h1>
                <p th:text="#{responsible.panel.subtitle}">Acesse as ações relacionadas às ofertas sob sua responsabilidade.</p>
            </div>
            <a class="button-link secondary" th:href="@{/professor/atuacao}" th:text="#{common.role.change}">Trocar papel</a>
        </header>

        <div class="actions">
            <a class="button-link" th:href="@{/professor-responsavel/documentacoes}" th:text="#{responsible.panel.analyzeDocs}">
                Analisar Documentações
            </a>
            <a class="button-link" th:href="@{/professor-responsavel/relatorios}" th:text="#{responsible.panel.approveReports}">
                Aprovar Relatórios
            </a>
            <a class="button-link" th:href="@{/professor-responsavel/ofertas}" th:text="#{responsible.panel.closeOffers}">
                Encerrar Ofertas
            </a>
            <a class="button-link" th:href="@{/ofertas}" th:text="#{responsible.panel.followOffers}">
                Acompanhar Ofertas
            </a>
        </div>
    </section>
</main>
</body>
</html>
