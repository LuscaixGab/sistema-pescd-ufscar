<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
        <div class="login-header">
            <p class="login-kicker">PESCD</p>
            <h1 id="login-title">Acesse sua conta</h1>
            <p>Use seu usuário ou e-mail para entrar no sistema.</p>
        </div>

        <div th:if="${mensagemErro}" class="login-message error" th:text="${mensagemErro}"></div>
        <div th:if="${mensagemLogout}" class="login-message success" th:text="${mensagemLogout}"></div>

        <form class="login-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label for="nomeUsuario">Usuário ou e-mail</label>
                <input
                        id="nomeUsuario"
                        name="nomeUsuario"
                        type="text"
                        placeholder="Digite seu usuário ou e-mail"
                        autocomplete="username"
                        required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input
                        id="senha"
                        name="senha"
                        type="password"
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                        required>
            </div>

            <div class="login-actions">
                <label class="remember-me">
                    <input type="checkbox" name="manterConectado">
                    <span>Manter conectado</span>
                </label>
                <a href="#">Esqueci minha senha</a>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <p class="login-footer">
            Ainda não tem acesso? <a href="#">Solicite cadastro</a>
        </p>
        <p class="login-footer">
            Acessar como <a th:href="@{/ofertas-publicas}">Visitante</a>
        </p>
    </section>
</main>
</body>
</html>
