<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar plano de trabalho | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker">Aluno</p>
                <h1>Enviar plano de trabalho</h1>
                <p>Preencha os dados da disciplina e anexe o arquivo do plano.</p>
            </div>
            <a class="button-link secondary" th:href="@{/aluno/ofertas}">Voltar</a>
        </header>

        <div th:if="${erroGeral}" class="notice error" th:text="${erroGeral}"></div>

        <form class="offer-form"
              th:action="@{/aluno/plano-trabalho/adicionar}"
              th:object="${planoTrabalhoForm}"
              method="post"
              enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{inscricaoId}">

            <div class="notice" th:if="${inscricao != null}" style="margin-top: 0;">
                Enviando plano para a matrícula da oferta
                <strong th:text="${inscricao.oferta.nomeOferta}">Nome da Oferta</strong>
                do semestre <strong th:text="${inscricao.oferta.semestre}">2026/1</strong>.
            </div>

            <div class="field-grid">
                <div class="field">
                    <label for="codigoDisciplina">Código da disciplina *</label>
                    <input id="codigoDisciplina" type="text" th:field="*{codigoDisciplina}" placeholder="Ex.: CC1234">
                    <small th:if="${#fields.hasErrors('codigoDisciplina')}" th:errors="*{codigoDisciplina}" class="field-error"></small>
                </div>

                <div class="field">
                    <label for="cursoDisciplina">Curso *</label>
                    <input id="cursoDisciplina" type="text" th:field="*{cursoDisciplina}" placeholder="Ex.: Ciência da Computação">
                    <small th:if="${#fields.hasErrors('cursoDisciplina')}" th:errors="*{cursoDisciplina}" class="field-error"></small>
                </div>
            </div>

            <div class="field">
                <label for="nomeDisciplina">Nome da disciplina *</label>
                <input id="nomeDisciplina" type="text" th:field="*{nomeDisciplina}" placeholder="Nome completo da disciplina">
                <small th:if="${#fields.hasErrors('nomeDisciplina')}" th:errors="*{nomeDisciplina}" class="field-error"></small>
            </div>

            <div class="field">
                <label for="professorSupervisorId">Professor supervisor *</label>
                <select id="professorSupervisorId" th:field="*{professorSupervisorId}">
                    <option value="">Selecione um professor</option>
                    <option th:each="professor : ${professores}"
                            th:value="${professor.id}"
                            th:text="${professor.nomeCompleto + ' (' + professor.nomeUsuario + ')'}"></option>
                </select>
                <small th:if="${#fields.hasErrors('professorSupervisorId')}" th:errors="*{professorSupervisorId}" class="field-error"></small>
            </div>

            <div class="field">
                <label for="arquivoPlano">Arquivo do plano * (Apenas PDF, máx 5MB)</label>
                <input id="arquivoPlano" type="file" th:field="*{arquivoPlano}" accept=".pdf,application/pdf">
                <small th:if="${#fields.hasErrors('arquivoPlano')}" th:errors="*{arquivoPlano}" class="field-error"></small>
            </div>

            <small th:if="${#fields.hasErrors('inscricaoId')}" th:errors="*{inscricaoId}" class="field-error"></small>

            <div class="actions">
                <button type="submit">Enviar plano</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
