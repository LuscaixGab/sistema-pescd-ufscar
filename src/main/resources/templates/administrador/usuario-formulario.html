<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}">Usuário | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{admin.kicker}">Administrador</p>
                <h1 th:text="${tituloPagina}">Usuário</h1>
                <p th:text="#{admin.form.subtitle}">Preencha os dados abaixo para cadastrar ou atualizar o acesso.</p>
            </div>
            <div class="actions" style="gap: 0.5rem;">
                <a class="button-link secondary" th:href="@{/administrador/usuarios}" th:text="#{common.back}">Voltar</a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button-link secondary" type="submit" th:text="#{common.logout}">Sair</button>
                </form>
            </div>
        </header>

        <div th:if="${erroGeral}" class="notice error" th:text="${erroGeral}"></div>

        <form class="offer-form"
              th:action="${formAction}"
              th:object="${administradorDTO}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">

            <div class="field-grid">
                <div class="field">
                    <label for="nomeCompleto" th:text="#{admin.form.fullName}">Nome completo *</label>
                    <input id="nomeCompleto" type="text" th:field="*{nomeCompleto}" placeholder="Nome do usuário" th:placeholder="#{admin.form.fullName.placeholder}">
                    <small th:if="${#fields.hasErrors('nomeCompleto')}" th:errors="*{nomeCompleto}" class="field-error"></small>
                </div>

                <div class="field">
                    <label for="perfil" th:text="#{admin.form.profile}">Perfil *</label>
                    <select id="perfil" th:field="*{perfil}">
                        <option value="" th:text="#{admin.form.selectProfile}">Selecione um perfil</option>
                        <option th:each="perfilItem : ${perfis}" th:value="${perfilItem}" th:text="${perfilItem}"></option>
                    </select>
                    <small th:if="${#fields.hasErrors('perfil')}" th:errors="*{perfil}" class="field-error"></small>
                </div>
            </div>

            <div class="field">
                <label for="email" th:text="#{admin.form.email}">E-mail *</label>
                <input id="email" type="email" th:field="*{email}" placeholder="usuario@exemplo.com">
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></small>
            </div>

            <div class="field">
                <label for="nomeUsuario" th:text="#{admin.form.username}">Nome de usuário *</label>
                <input id="nomeUsuario" type="text" th:field="*{nomeUsuario}" placeholder="login de acesso" th:placeholder="#{admin.form.username.placeholder}">
                <small th:if="${#fields.hasErrors('nomeUsuario')}" th:errors="*{nomeUsuario}" class="field-error"></small>
            </div>

            <div class="field">
                <label for="senha" th:text="#{common.password}">Senha</label>
                <input id="senha" type="password" th:field="*{senha}" placeholder="Digite uma nova senha" th:placeholder="#{admin.form.password.placeholder}">
                <small th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}" class="field-error"></small>
                <small class="muted" th:if="${administradorDTO.id != null}" th:text="#{admin.form.keepPassword}">
                    Deixe em branco para manter a senha atual.
                </small>
                <small class="muted" th:if="${administradorDTO.id == null}" th:text="#{admin.form.passwordRequired}">
                    Obrigatória no cadastro.
                </small>
            </div>

            <div class="actions">
                <button type="submit" th:text="${botaoTexto}">Salvar</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
