<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar Relatório | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <style>
        .page-shell { max-width: 800px !important; width: 95% !important; margin: 0 auto !important; }
        .page-card { width: 100% !important; max-width: none !important; }
        
        .info-box {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box p { margin: 5px 0; }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: inherit;
            resize: vertical;
            margin-top: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        /* Cores específicas para as ações de aprovar/reprovar */
        .btn-danger {
            background-color: #d32f2f !important;
            color: white !important;
            border: none;
            cursor: pointer;
        }
        
        .btn-success {
            background-color: #2e7d32 !important;
            color: white !important;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        
        <header class="page-header">
            <div>
                <p class="page-kicker">Área do Professor</p>
                <h1>Avaliar Relatório</h1>
                <p>Analise o documento e registre seu parecer final.</p>
            </div>
            <a class="button-link secondary" th:href="@{/professor/relatorios/pendentes}">Voltar</a>
        </header>

        <div class="info-box">
            <p><strong>Aluno:</strong> <span th:text="${inscricao.aluno.nomeCompleto}">Nome do Aluno</span></p>
            <p><strong>Oferta:</strong> <span th:text="${inscricao.oferta.nomeOferta}">Nome da Oferta</span></p>
            <p><strong>Semestre:</strong> <span th:text="${inscricao.oferta.semestre}">2026/1</span></p>
            
            <p style="margin-top: 15px;">
                <a href="#" class="button-link btn-sm" target="_blank">Baixar/Visualizar Relatório (PDF)</a>
            </p>
        </div>

        <form th:action="@{/professor/relatorios/avaliar/{id}(id=${inscricao.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <div class="form-group">
                <label for="parecer"><strong>Parecer do Professor:</strong></label>
                <textarea id="parecer" name="parecer" placeholder="Escreva suas observações e a justificativa..." required></textarea>
            </div>

            <div class="action-buttons">
                <button type="submit" name="acao" value="aprovar" class="button-link btn-success">Aprovar Relatório</button>
                <button type="submit" name="acao" value="reprovar" class="button-link btn-danger">Reprovar Relatório</button>
            </div>
        </form>

    </section>
</main>
</body>
</html>
