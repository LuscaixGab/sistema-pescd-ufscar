<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{professor.choose.title}">Escolher Atuação | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{professor.area}">Área do Professor</p>
                <h1 th:text="#{professor.choose.heading}">Escolha seu papel</h1>
                <p th:text="#{professor.choose.subtitle}">Selecione como deseja atuar no sistema neste momento.</p>
            </div>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="button-link secondary" type="submit" th:text="#{common.logout}">Sair</button>
            </form>
        </header>

        <div class="actions">
            <a class="button-link" th:href="@{/professor-responsavel/painel}" th:text="#{professor.responsible}">
                Professor Responsável
            </a>
            <a class="button-link" th:href="@{/professor/supervisao}" th:text="#{professor.supervisor}">
                Professor Supervisor
            </a>
        </div>
    </section>
</main>
</body>
</html>
