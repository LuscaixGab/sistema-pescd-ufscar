<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Escolher Atuação | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker">Área do Professor</p>
                <h1>Escolha seu papel</h1>
                <p>Selecione como deseja atuar no sistema neste momento.</p>
            </div>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="button-link secondary" type="submit">Sair</button>
            </form>
        </header>

        <div class="actions">
            <a class="button-link" th:href="@{/professor-responsavel/documentacoes}">
                Professor Responsável
            </a>

            <a class="button-link" th:href="@{/professor/planos/pendentes}">
                Prof. Supervisor (Avaliar Planos)
            </a>
            <a class="button-link" th:href="@{/professor/relatorios/pendentes}">
                Prof. Supervisor (Avaliar Relatórios)
            </a>
        </div>
    </section>
</main>
</body>
</html>
